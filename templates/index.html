<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes & Social Broadcaster</title>
    <meta name="description" content="Browse the latest Google Cloud BigQuery release notes and instantly share updates to Twitter/X with pre-configured social intents.">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-section">
                <div class="bq-logo" id="bq-logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                    </svg>
                </div>
                <div class="title-area">
                    <h1 id="app-main-title">BigQuery Release Notes</h1>
                    <p id="app-subtitle">Stay updated with Google Cloud BigQuery product changes and broadcast updates instantly.</p>
                </div>
            </div>
            <div class="actions-section">
                <div class="last-updated" id="last-updated-sec">
                    Last Checked: <span id="last-updated-time">Never</span>
                </div>
                <button class="btn-primary" id="btn-refresh" aria-label="Refresh release notes">
                    <svg class="spinner" id="refresh-spinner" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3">
                        <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                        <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"></path>
                    </svg>
                    <span id="btn-text">Refresh Feed</span>
                </button>
            </div>
        </header>

        <!-- Controls panel (Filters and Search) -->
        <section class="controls-panel" id="controls-section" aria-label="Search and Filter Controls">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" class="search-input" id="search-input" placeholder="Search update descriptions..." aria-label="Search updates">
            </div>
            
            <div class="filter-wrapper" id="filter-wrapper">
                <span class="filter-label">Filter Type:</span>
                <button class="filter-badge active" data-type="all" id="filter-all">All</button>
                <button class="filter-badge" data-type="feature" id="filter-feature">Feature</button>
                <button class="filter-badge" data-type="announcement" id="filter-announcement">Announcement</button>
                <button class="filter-badge" data-type="issue" id="filter-issue">Issue</button>
                <button class="filter-badge" data-type="deprecated" id="filter-deprecated">Deprecated</button>
                <button class="filter-badge" data-type="general" id="filter-general">General</button>
            </div>
        </section>

        <!-- Feed List -->
        <main class="feed-container" id="feed-container">
            <!-- Dynamically populated states will go here -->
            <div class="loading-state" id="loading-state">
                <div class="spinner"></div>
                <div class="loading-text">Fetching latest release notes from Google Cloud...</div>
            </div>
        </main>

        <!-- Floating Selection tweet panel -->
        <div class="selection-bar" id="selection-bar" role="dialog" aria-label="Selected update details">
            <div class="selection-info">
                Selected: <span id="selection-type">Feature</span> update from <span id="selection-date">June 17, 2026</span>
            </div>
            <div class="selection-actions">
                <button class="btn-selection-tweet" id="btn-selection-tweet" aria-label="Tweet selected update">
                    <svg viewBox="0 0 24 24">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    Tweet This
                </button>
                <button class="btn-cancel" id="btn-selection-cancel" aria-label="Clear selection">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Frontend logic -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
